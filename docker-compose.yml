services:
  postgres:
    image: postgres:latest
    container_name: taskroute-postgres
    environment:
      POSTGRES_DB: taskroute
      POSTGRES_USER: taskroute
      POSTGRES_PASSWORD: taskroute
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskroute -d taskroute"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: taskroute-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
